<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="sidebar">
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
      <div class="square"></div>
    </div>

    <div class="wrapper">
      <div class="app-col">
        <h2>What are we working on today?</h2>
        <select class="dropdown">
          <option>Manuscript to InDesign</option>
        </select>
        <label class="custom-btn" id="pdfLabel" for="pdfInput"
          >Choose Manuscript</label
        >
        <input type="file" id="pdfInput" style="display: none" />
        <label class="custom-btn" id="csvLabel" for="csvInput"
          >Choose CSV Map</label
        >
        <input type="file" id="csvInput" style="display: none" />
        <button id="runBtn">Let's go!</button>
        <div id="status">Ready to initialize</div>
      </div>
      <div class="guide-col" id="guide"></div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
