<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Textbook Compiler</title>
    <style>
      body {
        font-family: Verdana, sans-serif;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(-45deg, #ff661a, #ff945e, #ffffff, #f2f2f2);
      }
      .container {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 400px;
      }
      .custom-btn {
        background: white;
        border: 2px solid #ff661a;
        color: #ff661a;
        padding: 10px 20px;
        border-radius: 50px;
        cursor: pointer;
      }
      .loaded {
        background: #00a5a0 !important;
        color: white !important;
        border: 2px solid #00a5a0 !important;
      }
      #runBtn {
        background: #ff661a;
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 50px;
        margin-top: 20px;
        cursor: pointer;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Textbook Compiler</h2>
      <label class="custom-btn" id="pdfLabel" for="pdfInput"
        >Manuscript PDF</label
      >
      <input type="file" id="pdfInput" style="display: none" />
      <br /><br />
      <label class="custom-btn" id="csvLabel" for="csvInput"
        >Snippet Map CSV</label
      >
      <input type="file" id="csvInput" style="display: none" />
      <button id="runBtn">COMPILE AUTOMATION</button>
      <div id="status" style="margin-top: 20px">Ready</div>
    </div>

    <script>
      ["pdfInput", "csvInput"].forEach((id) =>
        document.getElementById(id).addEventListener("change", (e) => {
          document.getElementById(id.replace("Input", "Label")).innerText =
            "File loaded";
          document
            .getElementById(id.replace("Input", "Label"))
            .classList.add("loaded");
        }),
      );

      document.getElementById("runBtn").onclick = async () => {
        const csvText = await new Response(
          document.getElementById("csvInput").files[0],
        ).text();
        const status = document.getElementById("status");

        try {
          status.innerText = "Step 1/2: Generating Manifest...";
          const mRes = await fetch("/api/compile", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ task: "manifest", data: { csv: csvText } }),
          });
          const mJson = await mRes.json();

          status.innerText = "Buffer: Waiting...";
          await new Promise((r) => setTimeout(r, 2000));

          status.innerText = "Step 2/2: Generating Script...";
          const sRes = await fetch("/api/compile", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ task: "script", data: mJson.output }),
          });
          const sJson = await sRes.json();

          const a = document.createElement("a");
          a.href = URL.createObjectURL(new Blob([sJson.output]));
          a.download = "automation.jsx";
          a.click();
          status.innerText = "Finished!";
        } catch (e) {
          status.innerText = "Error - Check Console";
          console.error(e);
        }
      };
    </script>
  </body>
</html>
